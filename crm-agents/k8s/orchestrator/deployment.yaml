---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-orchestrator
  namespace: crm-agents
  labels:
    app: crm-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: crm-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: crm-agents
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: crm-orchestrator
          image: ghcr.io/your-org/crm-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: crm-orchestrator-config
            - secretRef:
                name: crm-orchestrator-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crm-orchestrator
  namespace: crm-agents
spec:
  selector:
    app: crm-orchestrator
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crm-orchestrator-hpa
  namespace: crm-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crm-orchestrator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
