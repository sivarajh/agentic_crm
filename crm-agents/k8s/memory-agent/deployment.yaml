---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-memory-agent-config
  namespace: crm-agents
data:
  SERVICE_NAME: crm-memory-agent
  PORT: "8002"
  BACKEND_URL: http://crm-backend.crm-platform.svc.cluster.local:8080
  REDIS_HOST: redis.crm-system.svc.cluster.local
  REDIS_PORT: "6379"
  QDRANT_HOST: qdrant.crm-system.svc.cluster.local
  QDRANT_PORT: "6333"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.crm-observability.svc.cluster.local:4317
  LOG_LEVEL: INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-memory-agent
  namespace: crm-agents
  labels:
    app: crm-memory-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-memory-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: crm-memory-agent
    spec:
      serviceAccountName: crm-agents
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: crm-memory-agent
          image: ghcr.io/your-org/crm-memory-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: crm-memory-agent-config
            - secretRef:
                name: crm-orchestrator-secret   # shared GCP credentials
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: crm-memory-agent
  namespace: crm-agents
spec:
  selector:
    app: crm-memory-agent
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crm-memory-agent-hpa
  namespace: crm-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crm-memory-agent
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
