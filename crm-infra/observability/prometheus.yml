global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: crm-otel-metrics
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: crm-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["crm-backend:8080"]

  - job_name: crm-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["crm-orchestrator:8001"]

  - job_name: crm-memory-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["crm-memory-agent:8002"]

  - job_name: crm-context-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["crm-context-agent:8003"]

  - job_name: crm-guardrails
    metrics_path: /metrics
    static_configs:
      - targets: ["crm-guardrails:8004"]
