---
# NOTE: In production, use ExternalSecrets or Vault injection rather than storing values here.
# These are placeholder values — replace with your actual secrets.
apiVersion: v1
kind: Secret
metadata:
  name: crm-backend-secret
  namespace: crm-platform
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: crm
  SPRING_DATASOURCE_PASSWORD: changeme-in-production
  GOOGLE_CLOUD_PROJECT: your-gcp-project-id
  GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/google/key.json
