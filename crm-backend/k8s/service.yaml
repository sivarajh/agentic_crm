---
apiVersion: v1
kind: Service
metadata:
  name: crm-backend
  namespace: crm-platform
  labels:
    app: crm-backend
spec:
  selector:
    app: crm-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
  type: ClusterIP
