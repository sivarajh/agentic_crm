---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-backend-config
  namespace: crm-platform
data:
  SPRING_PROFILES_ACTIVE: k8s
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.crm-system.svc.cluster.local:5432/crmdb
  SPRING_DATA_REDIS_HOST: redis.crm-system.svc.cluster.local
  SPRING_DATA_REDIS_PORT: "6379"
  QDRANT_HOST: qdrant.crm-system.svc.cluster.local
  QDRANT_PORT: "6333"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.crm-observability.svc.cluster.local:4317
  OTEL_SERVICE_NAME: crm-backend
  CRM_AGENTS_ORCHESTRATOR_URL: http://crm-orchestrator.crm-agents.svc.cluster.local:8001
  CRM_AGENTS_MEMORY_URL: http://crm-memory-agent.crm-agents.svc.cluster.local:8002
  CRM_AGENTS_CONTEXT_URL: http://crm-context-agent.crm-agents.svc.cluster.local:8003
  CRM_AGENTS_GUARDRAILS_URL: http://crm-guardrails.crm-agents.svc.cluster.local:8004
  CRM_SESSION_TTL_MINUTES: "30"
  CRM_CONTEXT_CACHE_TTL_MINUTES: "5"
  SERVER_PORT: "8080"
  MANAGEMENT_SERVER_PORT: "8081"
  LOGGING_STRUCTURED_FORMAT_CONSOLE_ENABLED: "true"
